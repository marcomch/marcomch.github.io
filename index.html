    // ====================== INICIALIZACIÓN DEL CANVAS DE MONITOREO ======================
    
    function initMonitorCanvas() {
        monitorCanvas = document.getElementById('monitor-canvas');
        if (!monitorCanvas) {
            console.error("❌ No se encontró el canvas del monitor");
            return;
        }
        
        monitorCtx = monitorCanvas.getContext('2d');
        
        // Ajustar tamaño del canvas al contenedor
        resizeMonitorCanvas();
        
        // Escuchar cambios de tamaño de ventana
        window.addEventListener('resize', resizeMonitorCanvas);
        
        console.log("✅ Canvas de monitoreo inicializado");
    }
    
    function resizeMonitorCanvas() {
        if (!monitorCanvas || !monitorChartEl) return;
        
        const containerWidth = monitorChartEl.clientWidth;
        const containerHeight = monitorChartEl.clientHeight;
        
        // Ajustar tamaño del canvas
        monitorCanvas.width = containerWidth;
        monitorCanvas.height = containerHeight;
        
        // Redibujar si hay datos
        if (activeTrade && priceHistoryData.length > 0) {
            drawMonitorChart();
        }
    }
    
    // ====================== SISTEMA DE GRÁFICO DE MONITOREO MEJORADO ======================
    
    function drawMonitorChart() {
        if (!monitorCtx || !monitorCanvas || priceHistoryData.length === 0) return;
        
        const width = monitorCanvas.width;
        const height = monitorCanvas.height;
        const padding = 20;
        const chartWidth = width - (padding * 2);
        const chartHeight = height - (padding * 2);
        
        // Limpiar canvas
        monitorCtx.clearRect(0, 0, width, height);
        
        // Dibujar fondo
        drawChartBackground(width, height, padding);
        
        // Calcular rangos de precios
        const prices = priceHistoryData.map(p => p.price);
        const entryPrice = activeTrade.entryPrice;
        const currentPrice = activeTrade.currentPrice;
        
        const minPrice = Math.min(...prices, entryPrice, currentPrice);
        const maxPrice = Math.max(...prices, entryPrice, currentPrice);
        const priceRange = Math.max(0.0001, maxPrice - minPrice);
        
        // Dibujar áreas de ganancia/pérdida
        drawProfitLossAreas(width, height, padding, chartHeight, minPrice, priceRange);
        
        // Dibujar líneas de referencia
        drawReferenceLines(width, height, padding, chartHeight, minPrice, priceRange);
        
        // Dibujar línea del precio (SOLO con puntos significativos)
        drawPriceLine(width, height, padding, chartWidth, chartHeight, minPrice, priceRange);
        
        // Dibujar punto de entrada
        drawEntryPoint(width, height, padding, chartWidth, chartHeight, entryPrice, minPrice, priceRange);
        
        // Dibujar punto actual
        drawCurrentPoint(width, height, padding, chartWidth, chartHeight, currentPrice, minPrice, priceRange);
        
        // Dibujar leyenda
        drawChartLegend(width, height);
        
        // Actualizar contador de puntos
        if (chartPointsInfo) {
            chartPointsInfo.textContent = `Puntos: ${priceHistoryData.length}`;
        }
    }
    
    function drawChartBackground(width, height, padding) {
        // Fondo del gráfico
        monitorCtx.fillStyle = 'rgba(0, 0, 0, 0.2)';
        monitorCtx.fillRect(padding, padding, width - (padding * 2), height - (padding * 2));
        
        // Borde del gráfico
        monitorCtx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
        monitorCtx.lineWidth = 1;
        monitorCtx.strokeRect(padding, padding, width - (padding * 2), height - (padding * 2));
        
        // Líneas de la grilla
        monitorCtx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
        monitorCtx.lineWidth = 0.5;
        
        // Líneas horizontales
        const horizontalLines = 5;
        for (let i = 0; i <= horizontalLines; i++) {
            const y = padding + (i * (height - (padding * 2)) / horizontalLines);
            monitorCtx.beginPath();
            monitorCtx.moveTo(padding, y);
            monitorCtx.lineTo(width - padding, y);
            monitorCtx.stroke();
        }
        
        // Líneas verticales (marcas de tiempo)
        const verticalLines = Math.min(10, priceHistoryData.length);
        for (let i = 0; i < verticalLines; i++) {
            const x = padding + (i * (width - (padding * 2)) / verticalLines);
            monitorCtx.beginPath();
            monitorCtx.moveTo(x, padding);
            monitorCtx.lineTo(x, height - padding);
            monitorCtx.stroke();
        }
    }
    
    function drawProfitLossAreas(width, height, padding, chartHeight, minPrice, priceRange) {
        if (!activeTrade) return;
        
        const entryPrice = activeTrade.entryPrice;
        const entryY = padding + chartHeight - ((entryPrice - minPrice) / priceRange * chartHeight);
        
        // Área de ganancia (verde claro)
        monitorCtx.fillStyle = 'rgba(46, 204, 113, 0.05)';
        monitorCtx.fillRect(padding, padding, width - (padding * 2), entryY - padding);
        
        // Área de pérdida (rojo claro)
        monitorCtx.fillStyle = 'rgba(231, 76, 60, 0.05)';
        monitorCtx.fillRect(padding, entryY, width - (padding * 2), height - padding - entryY);
    }
    
    function drawReferenceLines(width, height, padding, chartHeight, minPrice, priceRange) {
        // Línea de entrada
        const entryPrice = activeTrade.entryPrice;
        const entryY = padding + chartHeight - ((entryPrice - minPrice) / priceRange * chartHeight);
        
        monitorCtx.strokeStyle = 'rgba(52, 152, 219, 0.5)';
        monitorCtx.lineWidth = 2;
        monitorCtx.setLineDash([5, 3]);
        
        monitorCtx.beginPath();
        monitorCtx.moveTo(padding, entryY);
        monitorCtx.lineTo(width - padding, entryY);
        monitorCtx.stroke();
        
        // Restaurar línea sólida
        monitorCtx.setLineDash([]);
        
        // Etiqueta de línea de entrada
        monitorCtx.fillStyle = 'rgba(52, 152, 219, 0.8)';
        monitorCtx.font = '10px Arial';
        monitorCtx.fillText('Entrada', width - padding - 50, entryY - 5);
    }
    
    function drawPriceLine(width, height, padding, chartWidth, chartHeight, minPrice, priceRange) {
        if (priceHistoryData.length < 2) return;
        
        // Configurar estilo de línea
        monitorCtx.strokeStyle = activeTrade.isWinning ? 'rgba(46, 204, 113, 0.8)' : 'rgba(231, 76, 60, 0.8)';
        monitorCtx.lineWidth = 2;
        monitorCtx.lineJoin = 'round';
        monitorCtx.lineCap = 'round';
        
        // Filtrar puntos para suavizar la línea (eliminar puntos muy cercanos)
        const filteredPoints = priceHistoryData; // Usamos todos los puntos (ya están filtrados)
        
        // Dibujar línea de precio
        monitorCtx.beginPath();
        
        filteredPoints.forEach((point, index) => {
            const x = padding + (index * chartWidth / (filteredPoints.length - 1));
            const y = padding + chartHeight - ((point.price - minPrice) / priceRange * chartHeight);
            
            if (index === 0) {
                monitorCtx.moveTo(x, y);
            } else {
                monitorCtx.lineTo(x, y);
            }
        });
        
        monitorCtx.stroke();
        
        // Dibujar puntos SOLO en cambios significativos
        filteredPoints.forEach((point, index) => {
            // Solo dibujar puntos en el primero, último y cambios importantes
            if (index === 0 || index === filteredPoints.length - 1 || 
                isSignificantChange(filteredPoints, index)) {
                
                const x = padding + (index * chartWidth / (filteredPoints.length - 1));
                const y = padding + chartHeight - ((point.price - minPrice) / priceRange * chartHeight);
                
                monitorCtx.fillStyle = activeTrade.isWinning ? 'rgba(46, 204, 113, 1)' : 'rgba(231, 76, 60, 1)';
                monitorCtx.beginPath();
                monitorCtx.arc(x, y, 3, 0, Math.PI * 2);
                monitorCtx.fill();
                
                // Borde blanco en los puntos
                monitorCtx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
                monitorCtx.lineWidth = 1;
                monitorCtx.beginPath();
                monitorCtx.arc(x, y, 3, 0, Math.PI * 2);
                monitorCtx.stroke();
            }
        });
    }
    
    function drawEntryPoint(width, height, padding, chartWidth, chartHeight, entryPrice, minPrice, priceRange) {
        const x = padding;
        const y = padding + chartHeight - ((entryPrice - minPrice) / priceRange * chartHeight);
        
        // Dibujar punto de entrada
        monitorCtx.fillStyle = 'rgba(52, 152, 219, 1)';
        monitorCtx.beginPath();
        monitorCtx.arc(x, y, 6, 0, Math.PI * 2);
        monitorCtx.fill();
        
        // Borde blanco
        monitorCtx.strokeStyle = 'rgba(255, 255, 255, 1)';
        monitorCtx.lineWidth = 2;
        monitorCtx.beginPath();
        monitorCtx.arc(x, y, 6, 0, Math.PI * 2);
        monitorCtx.stroke();
        
        // Etiqueta
        monitorCtx.fillStyle = 'rgba(52, 152, 219, 1)';
        monitorCtx.font = 'bold 12px Arial';
        monitorCtx.fillText('E', x - 3, y + 4);
    }
    
    function drawCurrentPoint(width, height, padding, chartWidth, chartHeight, currentPrice, minPrice, priceRange) {
        const x = width - padding;
        const y = padding + chartHeight - ((currentPrice - minPrice) / priceRange * chartHeight);
        
        // Dibujar punto actual
        monitorCtx.fillStyle = activeTrade.isWinning ? 'rgba(46, 204, 113, 1)' : 'rgba(231, 76, 60, 1)';
        monitorCtx.beginPath();
        monitorCtx.arc(x, y, 8, 0, Math.PI * 2);
        monitorCtx.fill();
        
        // Anillo exterior
        monitorCtx.strokeStyle = activeTrade.isWinning ? 'rgba(46, 204, 113, 0.8)' : 'rgba(231, 76, 60, 0.8)';
        monitorCtx.lineWidth = 3;
        monitorCtx.beginPath();
        monitorCtx.arc(x, y, 10, 0, Math.PI * 2);
        monitorCtx.stroke();
        
        // Borde blanco interior
        monitorCtx.strokeStyle = 'rgba(255, 255, 255, 1)';
        monitorCtx.lineWidth = 2;
        monitorCtx.beginPath();
        monitorCtx.arc(x, y, 8, 0, Math.PI * 2);
        monitorCtx.stroke();
        
        // Etiqueta
        monitorCtx.fillStyle = 'rgba(255, 255, 255, 1)';
        monitorCtx.font = 'bold 12px Arial';
        monitorCtx.fillText('A', x - 3, y + 4);
        
        // Línea conectora al punto
        monitorCtx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
        monitorCtx.lineWidth = 1;
        monitorCtx.setLineDash([2, 2]);
        monitorCtx.beginPath();
        monitorCtx.moveTo(x, padding);
        monitorCtx.lineTo(x, height - padding);
        monitorCtx.stroke();
        monitorCtx.setLineDash([]);
        
        // Etiqueta de precio actual en el eje Y
        monitorCtx.fillStyle = activeTrade.isWinning ? 'rgba(46, 204, 113, 1)' : 'rgba(231, 76, 60, 1)';
        monitorCtx.font = 'bold 11px Arial';
        monitorCtx.fillText(currentPrice.toFixed(4), x + 5, y);
    }
    
    function drawChartLegend(width, height) {
        const padding = 10;
        
        // Fondo de la leyenda
        monitorCtx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        monitorCtx.fillRect(padding, padding, 150, 60);
        
        // Borde de la leyenda
        monitorCtx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
        monitorCtx.lineWidth = 1;
        monitorCtx.strokeRect(padding, padding, 150, 60);
        
        // Título
        monitorCtx.fillStyle = 'rgba(255, 255, 255, 0.9)';
        monitorCtx.font = 'bold 12px Arial';
        monitorCtx.fillText('LEYENDA', padding + 50, padding + 15);
        
        // Entrada
        monitorCtx.fillStyle = 'rgba(52, 152, 219, 1)';
        monitorCtx.beginPath();
        monitorCtx.arc(padding + 10, padding + 30, 4, 0, Math.PI * 2);
        monitorCtx.fill();
        monitorCtx.fillStyle = 'rgba(255, 255, 255, 0.8)';
        monitorCtx.font = '10px Arial';
        monitorCtx.fillText('Entrada', padding + 20, padding + 34);
        
        // Actual
        monitorCtx.fillStyle = activeTrade.isWinning ? 'rgba(46, 204, 113, 1)' : 'rgba(231, 76, 60, 1)';
        monitorCtx.beginPath();
        monitorCtx.arc(padding + 10, padding + 45, 4, 0, Math.PI * 2);
        monitorCtx.fill();
        monitorCtx.fillStyle = 'rgba(255, 255, 255, 0.8)';
        monitorCtx.font = '10px Arial';
        monitorCtx.fillText('Actual', padding + 20, padding + 49);
    }
    
    // FUNCIÓN PARA DETECTAR CAMBIOS SIGNIFICATIVOS
    function isSignificantChange(points, index) {
        if (index === 0 || index === points.length - 1) return true;
        
        const prevPrice = points[index-1].price;
        const currPrice = points[index].price;
        const nextPrice = points[index+1].price;
        
        // Cambio significativo si hay una reversión o cambio grande
        const prevChange = Math.abs(currPrice - prevPrice);
        const nextChange = Math.abs(nextPrice - currPrice);
        
        // Umbral basado en el instrumento
        const assetValue = document.getElementById("asset-selector").value;
        const xd = obtenerDecimalesPorInstrumento(assetValue);
        const threshold = xd >= 4 ? 0.0005 : 0.005; // Umbral diferente para forex vs índices
        
        return prevChange > threshold || nextChange > threshold;
    }
    
    // ====================== SISTEMA DE AUDIO PARA ALERTAS SONORAS ======================
    
    function initializeAudioSystem() {
        try {
            // Crear contexto de audio
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            gainNode = audioContext.createGain();
            gainNode.connect(audioContext.destination);
            gainNode.gain.value = 0.5; // Volumen al 50%
            console.log("🔊 Sistema de audio inicializado");
        } catch (e) {
            console.warn("⚠️ No se pudo inicializar el sistema de audio:", e.message);
            soundAlertsEnabled = false;
            updateSoundSwitch();
        }
    }
    
    function playAlertSound(type) {
        if (!soundAlertsEnabled || !audioContext) return;
        
        try {
            const oscillator = audioContext.createOscillator();
            const envelope = audioContext.createGain();
            
            oscillator.connect(envelope);
            envelope.connect(gainNode);
            
            // Configurar frecuencia según tipo de alerta
            switch(type) {
                case 'win':
                    oscillator.frequency.value = 880; // LA5
                    break;
                case 'loss':
                    oscillator.frequency.value = 440; // LA4
                    break;
                case 'warning':
                    oscillator.frequency.value = 660; // MI5
                    break;
                default:
                    oscillator.frequency.value = 523.25; // DO5
            }
            
            oscillator.type = 'sine';
            
            // Configurar envolvente ADSR
            envelope.gain.setValueAtTime(0, audioContext.currentTime);
            envelope.gain.linearRampToValueAtTime(0.3, audioContext.currentTime + 0.1);
            envelope.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
            
        } catch (e) {
            console.warn("⚠️ Error reproduciendo sonido:", e.message);
        }
    }
    
    function testSound(type) {
        playAlertSound(type);
        showNotification(
            type === 'win' ? 'Test Ganancia' : 'Test Pérdida',
            type === 'win' ? 'Sonido de alerta de ganancia' : 'Sonido de alerta de pérdida',
            type === 'win' ? 'success' : 'error'
        );
    }

    function requestNotificationPermission() {
        if (!('Notification' in window)) {
            console.log("⚠️ Este navegador no soporta notificaciones push");
            pushAlertsEnabled = false;
            updatePushSwitch();
            return;
        }
        
        if (Notification.permission === 'granted') {
            console.log("✅ Permiso para notificaciones ya concedido");
            return;
        }
        
        if (Notification.permission !== 'denied') {
            // Mostrar solicitud de permiso después de un delay
            setTimeout(() => {
                Notification.requestPermission().then(permission => {
                    if (permission === 'granted') {
                        console.log("✅ Permiso para notificaciones concedido");
                    } else {
                        console.log("❌ Permiso para notificaciones denegado");
                        pushAlertsEnabled = false;
                        updatePushSwitch();
                        saveAlertSettings();
                    }
                });
            }, 3000);
        }
    }
    
    function showNotification(title, message, type = 'info') {
        // 1. Notificación del navegador
        if (pushAlertsEnabled && Notification.permission === 'granted') {
            const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : '⚠️';
            const notification = new Notification(`Trading Manual - ${title}`, {
                body: `${icon} ${message}`,
                icon: 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png',
                tag: 'trading-alert'
            });
            
            notification.onclick = function() {
                window.focus();
                this.close();
            };
            
            // Cerrar automáticamente después de 5 segundos
            setTimeout(() => notification.close(), 5000);
        }
        
        // 2. Notificación interna en la aplicación
        showInternalNotification(title, message, type);
    }
    
    function showInternalNotification(title, message, type = 'info') {
        const notificationContainer = document.getElementById('notification-container');
        if (!notificationContainer) return;
        
        const notificationId = 'notification-' + Date.now();
        const iconClass = type === 'success' ? 'fa-check-circle' : 
                         type === 'error' ? 'fa-times-circle' : 
                         type === 'warning' ? 'fa-exclamation-triangle' : 'fa-info-circle';
        
        const notificationHTML = `
            <div class="notification ${type} show" id="${notificationId}">
                <div class="notification-icon">
                    <i class="fas ${iconClass}"></i>
                </div>
                <div class="notification-content">
                    <div class="notification-title">${title}</div>
                    <div class="notification-message">${message}</div>
                </div>
                <button class="notification-close" onclick="closeNotification('${notificationId}')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        `;
        
        notificationContainer.insertAdjacentHTML('afterbegin', notificationHTML);
        
        // Auto-cerrar después de 5 segundos
        setTimeout(() => {
            closeNotification(notificationId);
        }, 5000);
        
        // Limitar a 5 notificaciones simultáneas
        const notifications = notificationContainer.querySelectorAll('.notification');
        if (notifications.length > 5) {
            notifications[notifications.length - 1].remove();
        }
    }
    
    function closeNotification(id) {
        const notification = document.getElementById(id);
        if (notification) {
            notification.classList.remove('show');
            notification.classList.add('hide');
            setTimeout(() => notification.remove(), 300);
        }
    }

    function toggleSoundAlerts() {

            ? 'Alertas sonoras activadas' 
            : 'Alertas sonoras desactivadas';

    function togglePushAlerts() {
        if (!('Notification' in window)) {
            showInternalNotification('Error', 'Este navegador no soporta notificaciones push', 'error');
            return;
        }
        
        if (Notification.permission === 'denied') {
            showInternalNotification('Error', 'Permiso para notificaciones denegado. Por favor, habilítalo manualmente en la configuración del navegador.', 'error');
            return;
        }
        
        if (Notification.permission !== 'granted') {
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    pushAlertsEnabled = true;
                    updatePushSwitch();
                    saveAlertSettings();
                    showInternalNotification('Configuración', 'Notificaciones push activadas', 'success');

            });
        } else {
            pushAlertsEnabled = !pushAlertsEnabled;
            updatePushSwitch();
            saveAlertSettings();
            
            const message = pushAlertsEnabled 
                ? 'Notificaciones push activadas' 
                : 'Notificaciones push desactivadas';
            showInternalNotification('Configuración', message, pushAlertsEnabled ? 'success' : 'warning');

    function initializeLevelHistory() {

        for (let i = 0; i < 20; i++) {

    // FUNCIÓN PRINCIPAL: Determina si el precio actual es máximo, mínimo o medio
   function updatePriceLevel(currentPrice) {
        const numericPrice = parseFloat(currentPrice);
        
        // Agregar precio al historial
        priceHistory.push(numericPrice);
        
        // Mantener solo los últimos PRICE_HISTORY_LENGTH precios
        if (priceHistory.length > PRICE_HISTORY_LENGTH) {
            priceHistory.shift();
        }
        
        // Si no hay suficientes datos, retornar 'mid'
        if (priceHistory.length < 3) {
            currentPriceLevel = 'mid';
            return currentPriceLevel;
        }
        
        // Encontrar máximo y mínimo en el historial
        maxPrice = Math.max(...priceHistory);
        minPrice = Math.min(...priceHistory);
        
        // Determinar nivel actual
        if (numericPrice === maxPrice && numericPrice !== minPrice) {
            currentPriceLevel = 'max';
        } else if (numericPrice === minPrice && numericPrice !== maxPrice) {
            currentPriceLevel = 'min';
        } else {
            currentPriceLevel = 'mid';
            
            // Contar dígito verde (cuando el precio está en nivel medio)
            greenDigitsCount++;
        }
        
        // Actualizar historial de niveles
        levelHistory.push(currentPriceLevel);
        if (levelHistory.length > 20) {
            levelHistory.shift();
        }
        
        // Actualizar display
        updateLevelDisplay();
        
        return currentPriceLevel;
    }
    
    function updateLevelDisplay() {
        if (!priceLevelIndicator) return;
        
        // Actualizar indicador de nivel
        switch(currentPriceLevel) {
            case 'max':
                priceLevelIndicator.textContent = 'MÁXIMO';
                priceLevelIndicator.className = 'price-level-indicator level-max';
                break;
            case 'min':
                priceLevelIndicator.textContent = 'MÍNIMO';
                priceLevelIndicator.className = 'price-level-indicator level-min';
                break;
            case 'mid':
                priceLevelIndicator.textContent = 'MEDIO';
                priceLevelIndicator.className = 'price-level-indicator level-mid';
                break;
        }
        
        // Actualizar color del dígito actual según nivel
        if (currentDigitEl) {
            currentDigitEl.classList.remove('digit-green');
            
            if (currentPriceLevel === 'mid') {
                // Añadir clase especial para dígito verde (nivel medio)
                currentDigitEl.classList.add('digit-green');
            }
        }
        
        // Actualizar contador de dígitos verdes
        if (greenDigitCountBadge) {
            greenDigitCountBadge.textContent = greenDigitsCount;
        }
    }
    
    function updateDigitBadgesWithLevel(digit, level) {
        // Esta función actualiza los badges de dígitos con indicadores de nivel
        const badges = digitsContainer.querySelectorAll('.digit-badge');
        const lastBadge = badges[0]; // El último dígito agregado es el primero en la lista
        
        if (lastBadge) {
            // Remover clases anteriores
            lastBadge.classList.remove('max-digit', 'min-digit', 'mid-digit');
            
            // Añadir clase según nivel
            switch(level) {
                case 'max':
                    lastBadge.classList.add('max-digit');
                    lastMaxDigit = digit; // Guardar último dígito máximo
                    break;
                case 'min':
                    lastBadge.classList.add('min-digit');
                    lastMinDigit = digit; // Guardar último dígito mínimo
                    break;
                case 'mid':
                    lastBadge.classList.add('mid-digit');
                    break;
            }
        }
    }

    // ====================== FUNCIONES DE MONITOREO MEJORADO ======================
    function startTradeMonitor(tradeType, entryPrice) {
        const tradeId = 'trade-' + Date.now();
        
        activeTrade = {
            id: tradeId,
            type: tradeType,
            entryPrice: parseFloat(entryPrice),
            currentPrice: parseFloat(entryPrice),
            startTime: new Date(),
            ticksRemaining: 5,
            isWinning: false,
            profitLoss: 0.00
        };
        
        // Reiniciar datos del gráfico
        priceHistoryData = [{
            price: parseFloat(entryPrice),
            timestamp: Date.now()
        }];
        
        tradeMonitorEl.classList.remove('hidden');
        updateTradeMonitor(entryPrice);
        
        // Iniciar intervalo de actualización
        if (monitorInterval) clearInterval(monitorInterval);
        monitorInterval = setInterval(() => {
            if (activeTrade) {
                // Actualizar tiempo transcurrido
                updateElapsedTime();
                
                // Actualizar monitor
                updateMonitorFromPrice(activeTrade.currentPrice);
                
                // Redibujar gráfico
                drawMonitorChart();
            }
        }, 1000); // Actualizar cada segundo
        
        // Notificación de inicio
        showNotification(
            'Operación Iniciada',
            `${tradeType} @ $${entryPrice}`,
            'info'
        );
        
        // Actualizar canvas
        resizeMonitorCanvas();
        
        console.log(`📈 Monitor iniciado: ${tradeType} @ $${entryPrice}`);
    }
    
    function updateTradeMonitor(price) {
        if (!activeTrade) return;
        
        const assetValue = document.getElementById("asset-selector").value;
        const xd = obtenerDecimalesPorInstrumento(assetValue);
        const currentPrice = parseFloat(price).toFixed(xd);
        
        activeTrade.currentPrice = parseFloat(currentPrice);
        
        // Agregar al historial de precios para el gráfico
        priceHistoryData.push({
            price: activeTrade.currentPrice,
            timestamp: Date.now()
        });
        
        // Mantener solo los últimos puntos
        if (priceHistoryData.length > MAX_MONITOR_POINTS) {
            priceHistoryData.shift();
        }
        
        const difference = activeTrade.currentPrice - activeTrade.entryPrice;
        const percentageChange = (difference / activeTrade.entryPrice) * 100;
        
        let isWinning = false;
        if (activeTrade.type === 'CALL') {
            isWinning = difference > 0;
        } else if (activeTrade.type === 'PUT') {
            isWinning = difference < 0;
        }
        
        activeTrade.isWinning = isWinning;
        activeTrade.profitLoss = difference;
        
        // Actualizar estado visual
        updateMonitorStatus(isWinning);
        
        // Actualizar información en el panel
        updateMonitorInfoPanel(activeTrade.entryPrice, activeTrade.currentPrice, difference, percentageChange);
        
        // Actualizar ticks restantes
        if (activeTrade.ticksRemaining > 0) {
            activeTrade.ticksRemaining--;
            if (ticksRemainingEl) {
                ticksRemainingEl.textContent = `${activeTrade.ticksRemaining} ticks`;
                
                // Cambiar color según ticks restantes
                if (activeTrade.ticksRemaining <= 2) {
                    ticksRemainingEl.style.color = 'var(--danger-color)';
                } else if (activeTrade.ticksRemaining <= 3) {
                    ticksRemainingEl.style.color = 'var(--warning-color)';
                }
            }
        }
        
        // Redibujar gráfico
        drawMonitorChart();
    }
    
    function updateMonitorInfoPanel(entryPrice, currentPrice, difference, percentage) {
        const xd = obtenerDecimalesPorInstrumento(currentAsset);
        
        // Actualizar valores
        infoEntryPriceEl.textContent = entryPrice.toFixed(xd);
        infoCurrentPriceEl.textContent = currentPrice.toFixed(xd);
        infoCurrentPriceEl.className = `monitor-info-value ${difference >= 0 ? 'positive' : 'negative'}`;
        
        infoPriceDifferenceEl.textContent = difference.toFixed(xd);
        infoPriceDifferenceEl.className = `monitor-info-value ${difference >= 0 ? 'positive' : 'negative'}`;
        
        infoPercentageChangeEl.textContent = `${percentage >= 0 ? '+' : ''}${percentage.toFixed(4)}%`;
        infoPercentageChangeEl.className = `monitor-info-value ${percentage >= 0 ? 'positive' : 'negative'}`;
        
        infoTradeStateEl.textContent = difference >= 0 ? 'GANANDO' : 'PERDIENDO';
        infoTradeStateEl.className = `monitor-info-value ${difference >= 0 ? 'positive' : 'negative'}`;
        
        // Añadir indicador de ganancia/pérdida
        const profitIndicator = difference >= 0 ? 
            `<span class="profit-indicator positive">+${Math.abs(difference).toFixed(xd)}</span>` :
            `<span class="profit-indicator negative">-${Math.abs(difference).toFixed(xd)}</span>`;
        
        infoPriceDifferenceEl.innerHTML = `${difference.toFixed(xd)} ${profitIndicator}`;
    }
    
    function updateElapsedTime() {
        if (!activeTrade || !infoElapsedTimeEl) return;
        
        const elapsed = Date.now() - activeTrade.startTime;
        const seconds = Math.floor(elapsed / 1000);
        const minutes = Math.floor(seconds / 60);
        const remainingSeconds = seconds % 60;
        
        infoElapsedTimeEl.textContent = `${minutes.toString().padStart(2, '0')}:${remainingSeconds.toString().padStart(2, '0')}`;
    }
    
    function updateMonitorFromPrice(price) {
        if (!activeTrade) return;
        updateTradeMonitor(price);
    }
    
    function updateMonitorStatus(isWinning) {
        if (!monitorStatusEl) return;
        
        if (isWinning) {
            monitorStatusEl.className = 'monitor-status winning';
            monitorStatusEl.innerHTML = '<i class="fas fa-circle"></i><span>GANANDO</span>';
            monitorStatusEl.style.color = 'var(--success-color)';
        } else {
            monitorStatusEl.className = 'monitor-status losing';
            monitorStatusEl.innerHTML = '<i class="fas fa-circle"></i><span>PERDIENDO</span>';
            monitorStatusEl.style.color = 'var(--danger-color)';
        }
        
        // Cambiar color de fondo del gráfico según estado
        if (monitorChartEl) {
            if (isWinning) {
                monitorChartEl.style.backgroundColor = 'rgba(46, 204, 113, 0.05)';
                monitorChartEl.style.border = '1px solid rgba(46, 204, 113, 0.2)';
            } else {
                monitorChartEl.style.backgroundColor = 'rgba(231, 76, 60, 0.05)';
                monitorChartEl.style.border = '1px solid rgba(231, 76, 60, 0.2)';
            }
        }
    }
    
    function stopTradeMonitor() {
        if (monitorInterval) {
            clearInterval(monitorInterval);
            monitorInterval = null;
        }
        
        setTimeout(() => {
            tradeMonitorEl.classList.add('hidden');
        }, 3000);
        
        activeTrade = null;
        console.log("⏹️ Monitor detenido");
    }
    
    // ====================== FUNCIONES DE TRADING CORREGIDAS ======================
    function executeTrade(type) {
        if (!running) {
            alert("⚠️ Primero debes conectar el feed de precios");
            return;
        }
        
        if (isTrading) {
            alert("⏳ Ya hay una operación en curso. Espera a que termine.");
            return;
        }
        
        if (tradingStake <= 0) {
            alert("❌ El monto a operar debe ser mayor a 0");
            return;
        }
        
        if (tradingStake > balance) {
            alert("❌ Saldo insuficiente");
            return;
        }
        
        console.log(`🎯 Ejecutando operación ${type} por $${tradingStake.toFixed(2)}`);
        
        isTrading = true;
        tradeStatusEl.textContent = "OPERANDO...";
        tradeStatusEl.style.color = "#f39c12";
        
        const assetValue = document.getElementById("asset-selector").value;
        const xd = obtenerDecimalesPorInstrumento(assetValue);
        const currentPrice = parseFloat(priceEl.textContent).toFixed(xd);
        startTradeMonitor(type, currentPrice);
        
        // Llamar a la función de operación automática
        window.operarAutomatico(type === 'CALL' ? 'UP' : 'DOWN', tradingStake);
    }
    
    // ====================== FUNCIÓN PARA RESETEAR ESTADO DE TRADING ======================
    function resetTradingState() {
        isTrading = false;
        currentContract = null;
        tradeStatusEl.textContent = "LISTO";
        tradeStatusEl.style.color = "#27ae60";
        stopTradeMonitor();
        
        console.log("🔄 Estado de trading reiniciado");
    }
    
    // ====================== FUNCIÓN DE TIMEOUT PARA OPERACIONES COLGADAS ======================
    function setupTradeTimeout() {
        // Si después de 30 segundos no hay respuesta, reiniciar estado
        setTimeout(() => {
            if (isTrading) {
                console.warn("⚠️ Timeout: La operación lleva más de 30 segundos sin respuesta");
                resetTradingState();
                
                showNotification(
                    'Timeout de Operación',
                    'La operación excedió el tiempo límite. Se reinició el estado.',
                    'warning'
                );
            }
        }, 30000); // 30 segundos de timeout
    }
    
    function procesarResultadoTrading(ganancia) {
        console.log(`📊 Procesando resultado: $${ganancia.toFixed(2)}`);
        
        // Resetear estado de trading
        isTrading = false;
        
        stopTradeMonitor();
        
        balance += ganancia;
        totalProfit += ganancia;
        totalTrades++;
        
        if (ganancia > 0) {
            wins++;
            lastTradeEl.innerHTML = `<span style="color:#27ae60">CALL +$${ganancia.toFixed(2)}</span>`;
        } else {
            losses++;
            lastTradeEl.innerHTML = `<span style="color:#e74c3c">PUT -$${Math.abs(ganancia).toFixed(2)}</span>`;
        }
        
        const winRate = totalTrades > 0 ? Math.round((wins / totalTrades) * 100) : 0;
        
        updateTradingDisplay();
        winRateEl.textContent = `${winRate}%`;
        
        tradeStatusEl.textContent = "LISTO";
        tradeStatusEl.style.color = "#27ae60";
        
        currentContract = null; // IMPORTANTE: Limpiar el contrato actual
        
        // Notificación de resultado
        if (ganancia > 0) {
            showNotification(
                '¡Operación Ganadora!',
                `+$${ganancia.toFixed(2)} | Nuevo balance: $${balance.toFixed(2)}`,
                'success'
            );
            if (soundAlertsEnabled) playAlertSound('win');
        } else {
            showNotification(
                'Operación Perdedora',
                `-$${Math.abs(ganancia).toFixed(2)} | Nuevo balance: $${balance.toFixed(2)}`,
                'error'
            );
            if (soundAlertsEnabled) playAlertSound('loss');
        }
        
        console.log(`📊 Resultado: ${ganancia > 0 ? 'GANANCIA' : 'PÉRDIDA'} $${Math.abs(ganancia).toFixed(2)} | Balance: $${balance.toFixed(2)}`);
    }
    
    function updateTradingDisplay() {
        if (balanceEl) balanceEl.textContent = `$${balance.toFixed(2)}`;
        if (totalProfitEl) {
            totalProfitEl.textContent = `$${totalProfit > 0 ? '+' : ''}${totalProfit.toFixed(2)}`;
            totalProfitEl.style.color = totalProfit >= 0 ? '#27ae60' : '#e74c3c';
        }
        if (winsEl) winsEl.textContent = wins;
        if (lossesEl) lossesEl.textContent = losses;
        if (totalTradesEl) totalTradesEl.textContent = totalTrades;
        
        const stakeInput = document.getElementById('trading-stake');
        if (stakeInput && parseFloat(stakeInput.value) > balance) {
            stakeInput.style.borderColor = '#e74c3c';
        } else {
            stakeInput.style.borderColor = '';
        }
    }
    
    // ====================== SISTEMA DE TICKS ======================
    function startTicksPerMinuteCounter() {
        if (minuteTimer) clearInterval(minuteTimer);
        
        minuteTimer = setInterval(() => {
            ticksPerMinute = ticksCounter;
            ticksCounter = 0;
        }, 60000);
    }
    
    function addTickToHistory(price, digit, direction) {
        const tick = {
            price: price,
            digit: digit,
            direction: direction,
            time: new Date().toLocaleTimeString()
        };
        
        ticksHistory.unshift(tick);
        
        if (ticksHistory.length > 10) {
            ticksHistory.pop();
        }
    }
    
    // FUNCIÓN MODIFICADA: Ahora incluye nivel de precio
   function updateDigitsContainer(digit, wentUp, level) {
    digits.push({ value: digit, up: wentUp, level: level });
    if (digits.length > 10) {
        digits.shift();
    }
    
    if (digitCountEl) {
        digitCountEl.textContent = digits.length;
    }
    
    if (digitsContainer) {
        let html = '';
        // USAR digits directamente en orden natural (más reciente último)
        digits.forEach((item, index) => {
            let digitClass = item.up ? 'digit-blue' : 'digit-red';
            
            // Añadir clase según nivel
            switch(item.level) {
                case 'max':
                    digitClass += ' max-digit';
                    break;
                case 'min':
                    digitClass += ' min-digit';
                    break;
                case 'mid':
                    digitClass += ' mid-digit';
                    break;
            }
            
            html += `<span class="digit-badge ${digitClass}">${item.value}</span>`;
        });
        
        digitsContainer.innerHTML = html;
    }
}
    
    // ====================== FUNCIONES DE PROCESAMIENTO DE PRECIOS ======================
    function obtenerDecimalesPorInstrumento(assetValue) {
        switch(assetValue) {
            case 'R_100': return 2;
            case 'R_10': return 3;
            case 'R_25': return 3;
            case 'R_50': return 4;
            case 'R_75': return 4;
            case 'RDBEAR': return 4;
            case 'RDBULL': return 4;
            case 'frxEURUSD': return 5;
            case 'frxEURJPY': return 3;
            default: return 2;
        }
    }
    
    function esInstrumentoForex(assetValue) {
        return assetValue === 'frxEURUSD' || assetValue === 'frxEURJPY';
    }
    
    function extractDigitAfterDecimal(price) {
        const assetValue = document.getElementById("asset-selector").value;
        const xd = obtenerDecimalesPorInstrumento(assetValue);
        const formattedPrice = parseFloat(price).toFixed(xd);
        
        let digit;
        
        if (esInstrumentoForex(assetValue)) {
            var priceParts = formattedPrice.split('.');
            digit = priceParts[1] ? priceParts[1].slice(-1) : "0";
        } else {
            digit = formattedPrice.slice(-1);
        }
        
        return parseInt(digit);
    }
    
    function procesarDigitoConLogica010(digitActual, digitAnterior, wentUp) {
        let tic2nd = digitActual;
        
        if (digitActual !== 0) {
            tic2nd = wentUp ? parseFloat(digitActual) : -parseFloat(digitActual);
        } else {
            if (digitAnterior > 5 && digitActual === 0) {
                tic2nd = wentUp ? 10 : -10;
            } else if (digitAnterior <= 5 && digitActual === 0) {
                tic2nd = wentUp ? 0 : -0;
            }
        }
        
        return tic2nd;
    }
    
    function determineTrend(currentPrice, lastPrice) {
        if (lastPrice === null) return true;
        
        const assetValue = document.getElementById("asset-selector").value;
        const xd = obtenerDecimalesPorInstrumento(assetValue);
        
        const current = parseFloat(currentPrice).toFixed(xd);
        const last = parseFloat(lastPrice).toFixed(xd);
        
        return parseFloat(current) >= parseFloat(last);
    }
    
    // FUNCIÓN PRINCIPAL MODIFICADA: Ahora detecta nivel de precio
    function updateDigit(price, wentUp) {
        requestAnimationFrame(() => {
            const assetValue = document.getElementById("asset-selector").value;
            const xd = obtenerDecimalesPorInstrumento(assetValue);
            
            const formattedPrice = parseFloat(price).toFixed(xd);
            const digit = extractDigitAfterDecimal(price);
            
            // DETECTAR NIVEL DE PRECIO (MÁXIMO/MÍNIMO/MEDIO)
            const level = updatePriceLevel(formattedPrice);
            
            const digitAnterior = digitHistory.length > 0 ? digitHistory[digitHistory.length - 1] : null;
            const processedDigitValue = procesarDigitoConLogica010(digit, digitAnterior, wentUp);
            
            // Agregar a historial
            digitHistory.push(digit);
            if (digitHistory.length > 20) {
                digitHistory.shift();
            }
            
            // Actualizar elementos de la interfaz
            if (currentDigitEl) {
                currentDigitEl.textContent = digit;
                currentDigitEl.className = wentUp ? 'current-digit up' : 'current-digit down';
                
                // Añadir clase especial si es dígito verde (nivel medio)
                if (level === 'mid') {
                    currentDigitEl.classList.add('digit-green');
                }
            }
            
            if (priceEl) {
                priceEl.textContent = formattedPrice;
            }
            
            // Actualizar monitor si hay operación activa
            if (activeTrade && isTrading) {
                updateMonitorFromPrice(formattedPrice);
            }
            
            // Actualizar gráficos
            updateCanvasJSChart(digit, wentUp, Math.abs(processedDigitValue));
            updatePriceChart(price, digit, wentUp);
            
            // Actualizar contenedor de dígitos CON NIVEL
            updateDigitsContainer(digit, wentUp, level);
            
            // Actualizar badges con nivel
            updateDigitBadgesWithLevel(digit, level);
            
            // Actualizar contadores
            tickCount++;
            ticksCounter++;
            addTickToHistory(formattedPrice, digit, wentUp ? 'UP' : 'DOWN');
            
            lastPrice = price;
        });
    }
    
    // ====================== CONEXIÓN WEBSOCKET ======================
    function startFeed() {
        if (running) return;
        
        currentAsset = document.getElementById("asset-selector").value;
        
        const xd = obtenerDecimalesPorInstrumento(currentAsset);
        const esForex = esInstrumentoForex(currentAsset);
        console.log(`🎯 Instrumento: ${currentAsset}, Decimales: ${xd}, Forex: ${esForex}`);
        
        updateConnectionStatus("Conectando...", "#f39c12");
        
        ws = new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");
        ws.binaryType = 'arraybuffer';
        
        ws.onopen = () => {
            ws.send(JSON.stringify({ 
                ticks: currentAsset, 
                subscribe: 1 
            }));
            running = true;
            updateConnectionStatus("Conectado", "#27ae60");
            console.log(`✅ Conectado a ${currentAsset} (xd=${xd})`);
        };
        
        ws.onmessage = msg => {
            let data = JSON.parse(msg.data);
            if (data.tick) {
                let price = parseFloat(data.tick.quote).toFixed(6);
                let currentPrice = parseFloat(price);
                
                let wentUp = determineTrend(currentPrice, lastPrice);
                updateDigit(price, wentUp);
            }
        };
        
        ws.onclose = () => {
            running = false;
            updateConnectionStatus("Desconectado", "#e74c3c");
            console.log("🔌 Conexión cerrada");
            
            setTimeout(() => {
                if (!running) {
                    console.log("🔄 Intentando reconectar...");
                    startFeed();
                }
            }, 5000);
        };
        
        ws.onerror = () => {
            updateConnectionStatus("Error de conexión", "#e74c3c");
        };
    }
    
    function stopFeed() {
        if (ws) {
            ws.close();
        }
        running = false;
        updateConnectionStatus("Desconectado", "#e74c3c");
        console.log("⏹️ Feed detenido manualmente");
    }
    
    function updateConnectionStatus(text, color) {
        if (statusText) {
            statusText.textContent = text;
            statusText.style.color = color;
        }
        
        if (statusDot) {
            statusDot.style.backgroundColor = color;
        }
    }
    
    // ====================== SISTEMA DERIV AUTOTRADING CORREGIDO ======================
    const DERIV_API_TOKEN = "sFYENWAb4mricfa";
    const DURATION = 5;
    
    window.operarAutomatico = function(signal, stake) {
        console.log(`🔄 Iniciando operación manual para ${signal}...`);
        
        if (!derivWs || derivWs.readyState !== WebSocket.OPEN) {
            console.log("⚠️ API no lista - Intentando reconectar...");
            conectarDerivAPI();
            setTimeout(() => window.operarAutomatico(signal, stake), 3000);
            return;
        }

        const contract_type = signal === "UP" ? "CALL" : "PUT";
        const symbol_actual = document.getElementById("asset-selector").value || "R_10";

        const request = {
            buy: 1,
            price: stake,
            parameters: {
                amount: stake,
                basis: "stake",
                contract_type: contract_type,
                currency: "USD",
                duration: DURATION,
                duration_unit: "t",
                symbol: symbol_actual
            }
        };

        derivWs.send(JSON.stringify(request));
        console.log(`📤 OPERACIÓN ENVIADA: ${contract_type} | Stake: $${stake.toFixed(2)} | Símbolo: ${symbol_actual} | Duración: ${DURATION}t`);
        
        // Configurar timeout para operaciones colgadas
        setupTradeTimeout();
    };

    function validarResultadoContrato(contract_id, stake_inicial) {
        console.log(`🔍 Monitoreando contrato: ${contract_id}`);
        
        const subscribeRequest = {
            proposal_open_contract: 1,
            contract_id: contract_id,
            subscribe: 1
        };
        
        derivWs.send(JSON.stringify(subscribeRequest));
    }

    function conectarDerivAPI() {
        derivWs = new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=1089`);
        window.derivWs = derivWs;

        derivWs.onopen = () => {
            console.log("🔄 Conectando a Deriv API...");
            derivWs.send(JSON.stringify({ authorize: DERIV_API_TOKEN }));
        };

        derivWs.onmessage = (msg) => {
            const data = JSON.parse(msg.data);

            if (data.authorize) {
                console.log("✅ AUTORIZADO EN DERIV:", data.authorize.loginid);
                derivWs.send(JSON.stringify({ balance: 1, subscribe: 1 }));
                
                if (data.balance) {
                    balance = parseFloat(data.balance.balance);
                    updateTradingDisplay();
                    console.log(`💰 Balance real: $${balance.toFixed(2)}`);
                }
            }

            if (data.buy && data.buy.contract_id) {
                const contract_id = data.buy.contract_id;
                const stake = parseFloat(data.buy.buy_price);
                
                currentContract = {
                    contract_id: contract_id,
                    stake: stake,
                    timestamp: Date.now(),
                    status: 'open'
                };
                
                console.log(`🎉 COMPRA EXITOSA! ID: ${contract_id} | Stake: $${stake.toFixed(2)} USD`);
                
                balance -= stake;
                updateTradingDisplay();
                
                setTimeout(() => validarResultadoContrato(contract_id, stake), 2000);
            }

            if (data.proposal_open_contract) {
                const contract = data.proposal_open_contract;
                
                if (contract.is_sold) {
                    const profit = parseFloat(contract.profit);
                    const status = contract.status;
                    const contract_id = contract.contract_id;
                    
                    console.log(`🎯 CONTRATO FINALIZADO - ID: ${contract_id} | Status: ${status} | Ganancia: $${profit.toFixed(2)}`);
                    
                    // Procesar resultado
                    procesarResultadoTrading(profit);
                    
                    // Agregar al historial
                    addOperationToHistory({
                        id: contract_id,
                        timestamp: new Date().toLocaleTimeString(),
                        type: profit > 0 ? 'CALL' : 'PUT',
                        stake: currentContract ? currentContract.stake : tradingStake,
                        profit: profit,
                        result: profit > 0 ? 'WIN' : 'LOSS',
                        status: status
                    });
                    
                    // Mostrar resultado
                    mostrarResultadoOperacion(profit, status, contract_id);
                    
                    // Desuscribirse del contrato
                    derivWs.send(JSON.stringify({
                        proposal_open_contract: 0,
                        contract_id: contract_id,
                        subscribe: 0
                    }));
                    
                    // IMPORTANTE: Limpiar el contrato actual
                    currentContract = null;
                }
            }

            if (data.balance) {
                balance = parseFloat(data.balance.balance);
                updateTradingDisplay();
                console.log(`💰 Balance actualizado: $${balance.toFixed(2)}`);
            }

            if (data.error) {
                console.error("❌ ERROR DERIV:", data.error);
                
                // Manejar diferentes tipos de errores
                if (data.error.code === "ContractBuyValidation" || 
                    data.error.code === "InvalidContract" ||
                    data.error.code === "RateLimit") {
                    
                    console.error("❌ ERROR EN COMPRA:", data.error.message);
                    
                    // Restaurar el balance si había un contrato pendiente
                    if (currentContract) {
                        balance += currentContract.stake;
                        console.log(`💰 Balance restaurado: $${balance.toFixed(2)}`);
                    }
                    
                    // Resetear estado de trading
                    resetTradingState();
                    
                    // Mostrar notificación de error
                    showNotification(
                        'Error en Operación',
                        data.error.message || 'Error desconocido',
                        'error'
                    );
                    
                    updateTradingDisplay();
                }
            }
        };

        derivWs.onerror = (err) => {
            console.error("⚠️ Error WebSocket Deriv:", err);
        };

        derivWs.onclose = () => {
            console.log("🔌 Deriv API desconectada - Reconectando en 5s...");
            
            // Resetear estado si estaba operando
            if (isTrading) {
                console.warn("⚠️ Conexión perdida durante operación activa");
                resetTradingState();
            }
            
            currentContract = null;
            setTimeout(conectarDerivAPI, 5000);
        };
    }

    function mostrarResultadoOperacion(profit, status, contract_id) {
        const resultContent = document.getElementById('result-content');
        if (!resultContent) return;
        
        const resultadoHTML = `
            <div class="result-section" style="border: 2px solid ${profit > 0 ? '#27ae60' : '#e74c3c'}; border-radius: 8px; padding: 15px; margin-top: 8px; background: rgba(255, 255, 255, 0.04);">
                <div class="result-section-title" style="color: ${profit > 0 ? '#27ae60' : '#e74c3c'}; font-size: 1.1rem; margin-bottom: 10px;">
                    <i class="fas fa-${profit > 0 ? 'trophy' : 'times-circle'}"></i> 
                    ${profit > 0 ? 'OPERACIÓN GANADORA ✅' : 'OPERACIÓN PERDEDORA ❌'}
                </div>
                <div class="info-line" style="display: flex; justify-content: space-between; margin: 8px 0; font-size: 0.9rem;">
                    <span style="color: #95a5a6;">Contract ID:</span>
                    <span style="color: white; font-family: monospace;">${contract_id}</span>
                </div>
                <div class="info-line" style="display: flex; justify-content: space-between; margin: 8px 0; font-size: 0.9rem;">
                    <span style="color: #95a5a6;">Estado:</span>
                    <span style="color: white;">${status}</span>
                </div>
                <div class="info-line" style="display: flex; justify-content: space-between; margin: 8px 0; font-size: 0.9rem;">
                    <span style="color: #95a5a6;">Resultado:</span>
                    <strong style="color: ${profit > 0 ? '#27ae60' : '#e74c3c'}; font-size: 1.2rem;">
                        $${profit > 0 ? '+' : ''}${profit.toFixed(2)}
                    </strong>
                </div>
                <div class="info-line" style="display: flex; justify-content: space-between; margin: 8px 0; font-size: 0.9rem;">
                    <span style="color: #95a5a6;">Hora:</span>
                    <span style="color: white;">${new Date().toLocaleTimeString()}</span>
                </div>
                <div class="info-line" style="display: flex; justify-content: space-between; margin: 8px 0; font-size: 0.9rem;">
                    <span style="color: #95a5a6;">Nuevo Balance:</span>
                    <strong style="color: #3498db; font-size: 1.1rem;">
                        $${balance.toFixed(2)}
                    </strong>
                </div>
            </div>
        `;
        
        const existingContent = resultContent.innerHTML;
        const newContent = resultadoHTML + existingContent;
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = newContent;
        
        const sections = tempDiv.querySelectorAll('.result-section');
        if (sections.length > 5) {
            for (let i = 5; i < sections.length; i++) {
                sections[i].remove();
            }
        }
        
        resultContent.innerHTML = tempDiv.innerHTML;
        document.getElementById('result-panel').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
        
        console.log(`📈 Resultado mostrado: ${profit > 0 ? 'WIN' : 'LOSS'} $${profit.toFixed(2)}`);
    }

    // ====================== HISTORIAL DE OPERACIONES ======================
    function addOperationToHistory(operationData) {
        operationsHistory.unshift(operationData);
        
        if (operationsHistory.length > MAX_HISTORY) {
            operationsHistory.pop();
        }
        
        try {
            localStorage.setItem('operationsHistory', JSON.stringify(operationsHistory));
        } catch (e) {
            console.log('No se pudo guardar en localStorage:', e);
        }
    }

    function loadOperationsHistory() {
        try {
            const saved = localStorage.getItem('operationsHistory');
            if (saved) {
                operationsHistory = JSON.parse(saved);
                console.log(`📚 Historial cargado: ${operationsHistory.length} operaciones`);
            }
        } catch (e) {
            console.log('No se pudo cargar el historial:', e);
        }
    }
    
    // Event listener para actualizar stake cuando cambia el input
    document.getElementById('trading-stake').addEventListener('input', function() {
        tradingStake = parseFloat(this.value) || 1;
        updateStakeDisplay();
    });
    </script>
